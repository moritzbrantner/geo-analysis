name: Publish Rust crate

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-moenarch-geo-core:
    name: Publish moenarch-geo-core
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Test moenarch-geo-core
        run: cargo test -p moenarch-geo-core

      - name: Package moenarch-geo-core
        run: cargo package -p moenarch-geo-core

      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish moenarch-geo-core
        run: cargo publish -p moenarch-geo-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
